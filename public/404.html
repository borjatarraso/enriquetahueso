    <style>
        :root {
            --bg-1: #181210;
            --bg-2: #2c1c12;
            --gold: #d4af56;
            --gold-dim: #aa843c;
            --cream: #f2e6d0;
            --muted: #b8a98a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, rgba(170,132,60,.18), transparent 60%),
                        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
            color: var(--cream);
            font-family: "Cormorant Garamond", Georgia, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .monogram {
            display: inline-block;
            width: 88px;
            height: 88px;
            border-radius: 16px;
            background: var(--bg-2);
            color: var(--gold);
            line-height: 88px;
            font-family: "Cinzel", Georgia, serif;
            font-weight: 700;
            font-size: 42px;
            letter-spacing: -2px;
            margin-bottom: 2.25rem;
        }
        h1 {
            font-family: "Cinzel", Georgia, serif;
            font-weight: 700;
            font-size: clamp(3rem, 12vw, 5.5rem);
            color: var(--gold);
            letter-spacing: 0.04em;
            margin-bottom: 0.4rem;
            line-height: 1;
        }
        h2 {
            font-family: "Cormorant Garamond", Georgia, serif;
            font-weight: 400;
            font-style: italic;
            font-size: clamp(1.4rem, 4vw, 2rem);
            color: var(--cream);
            margin-bottom: 1.75rem;
        }
        .lead {
            font-size: 1.125rem;
            color: var(--muted);
            max-width: 32rem;
            margin: 0 auto 2.5rem;
            line-height: 1.55;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 2.5rem;
        }
        .btn {
            display: inline-block;
            padding: 0.85rem 1.5rem;
            border: 1px solid var(--gold);
            border-radius: 4px;
            color: var(--cream);
            text-decoration: none;
            font-family: "Cinzel", Georgia, serif;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: background .2s, color .2s;
        }
        .btn:hover { background: var(--gold); color: var(--bg-1); }
        .btn.primary { background: var(--gold); color: var(--bg-1); }
        .btn.primary:hover { background: var(--gold-dim); border-color: var(--gold-dim); }
        .links {
            font-size: 0.95rem;
            color: var(--muted);
        }
        .links a {
            color: var(--cream);
            text-decoration: none;
            border-bottom: 1px solid rgba(212,175,86,.4);
            margin: 0 0.5rem;
            padding-bottom: 1px;
        }
        .links a:hover { color: var(--gold); border-bottom-color: var(--gold); }
        footer {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: rgba(184,169,138,.6);
            font-style: italic;
        }

</head>
